name: Collect Reviews & Rank

on:
  schedule:
    - cron: '0 21 * * *'  # 06:00 KST
    - cron: '0 7 * * *'   # 16:00 KST
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (review collector)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAND_CODE: ${{ secrets.BRAND_CODE }}
        run: python -m collector.pipeline

      - name: Run rank collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAND_CODE: ${{ secrets.BRAND_CODE }}
        run: python -m collector.rank_collector
