name: Collect Rank (3h interval)

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'  # every 3h UTC = every 3h KST
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rank collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAND_CODE: ${{ secrets.BRAND_CODE }}
        run: python -m collector.rank_collector
